
# ──────────────────────────────────────────────────────────────
#  semantic-cache — self-hosted deployment
#
#  SETUP (one-time):
#    cp .env.example .env      ← fill in your passwords
#    docker-compose up -d
#
#  USEFUL COMMANDS:
#    Logs:      docker-compose logs -f cache-proxy
#    Tear down: docker-compose down -v
#    Restart:   docker-compose restart cache-proxy
# ──────────────────────────────────────────────────────────────

services:

  # ── 1. Semantic Cache Proxy ───────────────────────────────────
  cache-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic-cache-proxy
    ports:
      - "8080:8080"   # HTTP API — your app points here
      - "9090:9090"   # Prometheus metrics (keep private)
    environment:
      # ── Infra (auto-wired to other containers) ───────────────
      REDIS_URL:      "redis:6379"
      POSTGRES_URL:   "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      OLLAMA_URL:     "${OLLAMA_URL:-http://ollama:11434}"
      # ── Security ─────────────────────────────────────────────
      JWT_SECRET:     "${JWT_SECRET}"
      # ── Cache tuning ─────────────────────────────────────────
      L1_MAX_BYTES:   "${L1_MAX_BYTES:-134217728}"
      L1_DEFAULT_TTL: "${L1_DEFAULT_TTL:-3600}"
      # ── Rate limiting ─────────────────────────────────────────
      RATE_LIMIT_RPM: "${RATE_LIMIT_RPM:-1000}"
      # ── Circuit breaker ──────────────────────────────────────
      CB_MAX_FAILURES: "${CB_MAX_FAILURES:-5}"
      CB_TIMEOUT:      "${CB_TIMEOUT:-30s}"
      # ── Observability ────────────────────────────────────────
      LOG_LEVEL:       "${LOG_LEVEL:-info}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - cache-net

  # ── 2. PostgreSQL 16 + pgvector ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: semantic-cache-postgres
    environment:
      POSTGRES_DB:       "${POSTGRES_DB:-cache}"
      POSTGRES_USER:     "${POSTGRES_USER:-cache}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cache} -d ${POSTGRES_DB:-cache}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - cache-net

  # ── 3. Redis 7.2 ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: semantic-cache-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - cache-net

  # ── 4. Ollama (local embeddings — no API key needed) ─────────
  ollama:
    image: ollama/ollama:latest
    container_name: semantic-cache-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    restart: unless-stopped
    networks:
      - cache-net

  # ── 4a. Ollama Model Initializer ─────────────────────────────
  ollama-init:
    image: curlimages/curl:latest
    container_name: semantic-cache-ollama-init
    depends_on:
      - ollama
    command: >
      sh -c "
        echo 'Waiting for Ollama API...'
        until curl -s http://ollama:11434/api/tags > /dev/null; do sleep 2; done
        echo 'Pulling nomic-embed-text model (this may take a minute)...'
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}'
        echo 'Model pulled successfully!'
      "
    networks:
      - cache-net

  # ── 5. Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: semantic-cache-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/alerts.yaml:/etc/prometheus/alerts.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9091:9090"   # Prometheus UI: http://localhost:9091
    restart: unless-stopped
    networks:
      - cache-net

  # ── 6. Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: semantic-cache-grafana
    ports:
      - "4000:3000"   # Grafana UI: http://localhost:4000
    environment:
      GF_SECURITY_ADMIN_USER:     "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP:    "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_DATASOURCES_DEFAULT_NAME: Prometheus
      GF_DATASOURCES_DEFAULT_TYPE: prometheus
      GF_DATASOURCES_DEFAULT_URL:  http://prometheus:9090
    volumes:
      - grafanadata:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - cache-net

# ── Networks ──────────────────────────────────────────────────
networks:
  cache-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:
  ollamadata:
  prometheusdata:
  grafanadata:
